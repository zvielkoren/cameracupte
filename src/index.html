<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CameraCupte Pro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
  <!-- MediaPipe AI Focus -->
  <script src="./mediapipe/face_detection.js"></script>
  <script src="./main.js" defer></script>
</head>
<body>
  <div class="app-container">
    <header class="app-header glass-panel">
      <div class="logo">
        <svg class="camera-icon" xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M14.5 4h-5L7 7H4a2 2 0 0 0-2 2v9a2 2 0 0 0 2 2h16a2 2 0 0 0 2-2V9a2 2 0 0 0-2-2h-3l-2.5-3z"></path>
          <circle cx="12" cy="13" r="3"></circle>
        </svg>
        <h1>CameraCupte <span class="badge">PRO</span></h1>
      </div>
      <div id="status-pill" class="status-pill offline">
        <span class="indicator"></span>
        <span class="status-text">Disconnected</span>
      </div>
    </header>

    <main class="main-content">
      <!-- Video Preview Area -->
      <section class="preview-section glass-panel">
        <div class="preview-wrapper" id="preview-wrapper">
          <img id="preview-img" class="preview-image" alt="Live View">
          <img id="preview-background" class="preview-background" alt="Blur Layer">
          <div id="focus-box" class="focus-box"></div>
          
          <div class="viewfinder-marks">
            <div class="mark top-left"></div>
            <div class="mark top-right"></div>
            <div class="mark bottom-left"></div>
            <div class="mark bottom-right"></div>
            <div class="crosshair"></div>
          </div>

          <div class="status-indicator">
            <div class="status-dot"></div>
            <span>Idle</span>
          </div>

          <div class="preview-placeholder" id="preview-placeholder">
            <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <path d="m22 8-6 4 6 4V8Z"/>
              <rect x="2" y="6" width="14" height="12" rx="2" ry="2"/>
            </svg>
            <p>Camera signal missing</p>
          </div>
        </div>
      </section>

      <!-- Controls Area -->
      <aside class="controls-section">
        <div class="control-panel glass-panel">
          <h2><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"></path><polyline points="3.27 6.96 12 12.01 20.73 6.96"></polyline><line x1="12" y1="22.08" x2="12" y2="12"></line></svg> Connection</h2>
          
          <div class="control-group">
            <label for="device-path">Virtual Device Path</label>
            <div class="input-with-btn">
              <input id="device-path" value="/dev/video9" required />
              <button id="create-device-btn" class="icon-btn" title="Initialize Virtual Device" type="button">
                <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"></path><path d="M3 3v5h5"></path></svg>
              </button>
            </div>
          </div>
          
          <button id="start-btn" class="btn btn-primary btn-block glow-effect">
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            Start Stream
          </button>
        </div>

        <div class="control-panel glass-panel">
          <h2><svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg> Camera Settings</h2>
          
          <div class="settings-grid">
            <div class="control-group">
              <label for="iso-select">ISO Speed</label>
              <div class="custom-select-wrapper">
                <select id="iso-select">
                  <option value="100">100</option>
                  <option value="200">200</option>
                  <option value="400">400</option>
                  <option value="800">800</option>
                  <option value="1600">1600</option>
                  <option value="3200">3200</option>
                  <option value="6400">6400</option>
                </select>
              </div>
            </div>
            
            <div class="control-group">
              <label for="aperture-select">Aperture</label>
              <div class="custom-select-wrapper">
                <select id="aperture-select">
                  <option value="1.8">f/1.8</option>
                  <option value="2.8">f/2.8</option>
                  <option value="4">f/4</option>
                  <option value="5.6">f/5.6</option>
                  <option value="8">f/8</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="shutter-select">Shutter Speed</label>
              <div class="custom-select-wrapper">
                <select id="shutter-select">
                  <option value="1/30">1/30</option>
                  <option value="1/50">1/50</option>
                  <option value="1/60">1/60</option>
                  <option value="1/100">1/100</option>
                  <option value="1/125">1/125</option>
                  <option value="1/250">1/250</option>
                  <option value="1/500">1/500</option>
                  <option value="1/1000">1/1000</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label>Focus Control</label>
              <div class="focus-controls-advanced">
                <div class="custom-select-wrapper full-width mb-1">
                  <select id="focus-mode-select">
                    <option value="Manual">Manual Focus</option>
                    <option value="One Shot">Autofocus (One Shot)</option>
                    <option value="AI Tracking">AI Face Tracking</option>
                    <option value="Smart Focus">Smart Eye-Priority</option>
                    <option value="Manual Object">Manual Object Tracking</option>
                  </select>
                </div>
                <div class="toggle-group mb-1">
                  <label class="switch">
                    <input type="checkbox" id="peaking-toggle">
                    <span class="slider round"></span>
                  </label>
                  <span>Focus Peaking (Beta)</span>
                </div>
                <div class="toggle-group mb-1">
                  <label class="switch">
                    <input type="checkbox" id="portrait-toggle">
                    <span class="slider round"></span>
                  </label>
                  <span>Portrait Mode (Blur)</span>
                </div>
                <div id="portrait-controls" class="control-group mt-1" style="display: none;">
                  <input type="range" id="portrait-blur-slider" min="0" max="20" value="10" class="pro-slider">
                </div>
                <div class="focus-actions">
                  <button id="trigger-af-btn" class="btn btn-secondary btn-sm" title="Trigger Autofocus">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                    Trigger AF
                  </button>
                  <div class="manual-step-group">
                    <button id="focus-near-btn" class="icon-btn-sm" title="Step Near">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m15 18-6-6 6-6"/></svg>
                    </button>
                    <div class="custom-select-wrapper compact">
                      <select id="focus-step-select">
                        <option value="1">S1</option>
                        <option value="2">S2</option>
                        <option value="3">S3</option>
                      </select>
                    </div>
                    <button id="focus-far-btn" class="icon-btn-sm" title="Step Far">
                      <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m9 18 6-6-6-6"/></svg>
                    </button>
                  </div>
                </div>
              </div>
            </div>

            <div class="control-group">
              <label for="wb-select">White Balance</label>
              <div class="custom-select-wrapper">
                <select id="wb-select">
                  <option value="Auto">Auto</option>
                  <option value="Daylight">Daylight</option>
                  <option value="Cloudy">Cloudy</option>
                  <option value="Tungsten">Tungsten</option>
                  <option value="Fluorescent">Fluorescent</option>
                  <option value="Flash">Flash</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="style-select">Picture Style</label>
              <div class="custom-select-wrapper">
                <select id="style-select">
                  <option value="Standard">Standard</option>
                  <option value="Portrait">Portrait</option>
                  <option value="Landscape">Landscape</option>
                  <option value="Neutral">Neutral</option>
                  <option value="Faithful">Faithful</option>
                  <option value="Monochrome">Monochrome</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="exposure-select">Exposure Comp</label>
              <div class="custom-select-wrapper">
                <select id="exposure-select">
                  <option value="0">0 EV</option>
                  <option value="1/3">+1/3</option>
                  <option value="2/3">+2/3</option>
                  <option value="1">+1.0</option>
                  <option value="-1/3">-1/3</option>
                  <option value="-2/3">-2/3</option>
                  <option value="-1">-1.0</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="metering-select">Metering Mode</label>
              <div class="custom-select-wrapper">
                <select id="metering-select">
                  <option value="Evaluative">Evaluative</option>
                  <option value="Partial">Partial</option>
                  <option value="Spot">Spot</option>
                  <option value="Center-weighted">Center-weighted</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="flash-select">Flash Mode</label>
              <div class="custom-select-wrapper">
                <select id="flash-select">
                  <option value="Auto">Auto</option>
                  <option value="On">On</option>
                  <option value="Off">Off</option>
                  <option value="Red-eye">Red-eye</option>
                </select>
              </div>
            </div>

            <div class="control-group">
              <label for="resolution-select">Stream Resolution</label>
              <div class="custom-select-wrapper">
                <select id="resolution-select">
                  <option value="large">1056x704 (Max)</option>
                  <option value="medium">528x352 (Fast)</option>
                </select>
              </div>
            </div>
          </div>
        </div>

        <div class="sidebar-footer">
          <button id="debug-config-btn" class="btn btn-secondary btn-sm full-width">
            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 20h.01M7 20h.01M17 20h.01M8 14v4M12 14v4M16 14v4M6 2h12a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z"/></svg>
            Debug Camera Config
          </button>
        </div>
      </aside>
    </main>
    
    <div id="toast-container" class="toast-container"></div>
  </div>
</body>
</html>
